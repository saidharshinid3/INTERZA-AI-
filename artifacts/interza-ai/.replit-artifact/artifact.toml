kind = "web"
previewPath = "/"
title = "Interza AI"
version = "1.0.0"
id = "artifacts/interza-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21593

[services.development]
run = "pnpm --filter @workspace/interza-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interza-ai", "run", "build" ]
publicDir = "artifacts/interza-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21593"
BASE_PATH = "/"
